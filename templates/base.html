<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sistema Expensas{% endblock %}</title>
</head>
<body>

    <nav>
        <a href="/">Inicio</a>

        {% if user.is_authenticated %}
            <p>Hola {{ user.username }}</p>
            <a href="{% url 'logout' %}">Cerrar sesión</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
        {% endif %}
    </nav>

    <hr>

    {% block content %}
    {% endblock %}

</body>
</html>
