{% extends 'base.html' %}
{% block title %}Nueva titularidad{% endblock %}
{% block content %}

<div class="mb-6 flex items-center justify-between">
    <h1 class="text-2xl font-bold text-slate-800">Nueva titularidad</h1>
    <a href="{% url 'listar_titularidades' %}"
       class="bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 px-4 py-2 rounded-md font-medium transition-colors text-sm">
        ← Volver
    </a>
</div>

<div class="bg-white border border-slate-200 rounded-lg shadow-sm p-6 max-w-lg">
    <form method="post">
        {% csrf_token %}
        <div class="space-y-4">
            {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    {% for error in field.errors %}
                        <p class="text-red-600 text-xs mt-1">{{ error }}</p>
                    {% endfor %}
                {% endif %}
            </div>
            {% endfor %}
        </div>
        <div class="mt-6">
            <button type="submit"
                    class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-md font-medium transition-colors text-sm">
                Guardar
            </button>
        </div>
    </form>
</div>

<style>
    #content input, #content select { border:1px solid #cbd5e1; border-radius:6px; padding:8px 12px; width:100%; font-size:14px; outline:none; }
    #content input:focus, #content select:focus { border-color:#10b981; box-shadow:0 0 0 2px rgba(16,185,129,0.2); }
</style>

{% endblock %}
