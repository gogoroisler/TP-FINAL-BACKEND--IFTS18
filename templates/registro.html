{% extends 'base.html' %}
{% block title %}Registro{% endblock %}
{% block content %}
<h1>Crear cuenta</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Registrarse</button>
</form>
<p>¿Ya tenés cuenta? <a href="{% url 'login' %}">Iniciá sesión</a></p>
{% endblock %}
