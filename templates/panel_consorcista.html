{% extends 'base.html' %}
{% block title %}Panel Consorcista{% endblock %}
{% block content %}

<div class="mb-6">
    <h1 class="text-2xl font-bold text-slate-800">Panel Consorcista</h1>
    <p class="text-slate-500 mt-1">Bienvenido, {{ user.username }}</p>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">

    <!-- Mis Expensas -->
    <div class="bg-white border border-slate-200 rounded-lg shadow-sm p-6">
        <div class="flex items-center gap-3 mb-4">
            <div class="w-10 h-10 bg-emerald-100 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
            </div>
            <h2 class="text-base font-semibold text-slate-800">Mis Expensas</h2>
        </div>
        <a href="{% url 'mis_expensas' %}"
           class="inline-flex items-center gap-1 text-sm text-emerald-600 hover:text-emerald-700 font-medium">
            Ver mis expensas →
        </a>
    </div>

    <!-- Mis Reclamos -->
    <div class="bg-white border border-slate-200 rounded-lg shadow-sm p-6">
        <div class="flex items-center gap-3 mb-4">
            <div class="w-10 h-10 bg-red-100 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
            <h2 class="text-base font-semibold text-slate-800">Mis Reclamos</h2>
        </div>
        <div class="space-y-2">
            <a href="{% url 'mis_reclamos' %}"
               class="block text-sm text-emerald-600 hover:text-emerald-700 font-medium">Ver mis reclamos →</a>
            <a href="{% url 'crear_reclamo' %}"
               class="block text-sm text-emerald-600 hover:text-emerald-700 font-medium">Nuevo reclamo →</a>
        </div>
    </div>

    <!-- Avisos del consorcio -->
    <div class="bg-white border border-slate-200 rounded-lg shadow-sm p-6">
        <div class="flex items-center gap-3 mb-4">
            <div class="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"/>
                </svg>
            </div>
            <h2 class="text-base font-semibold text-slate-800">Avisos del consorcio</h2>
        </div>
        <a href="{% url 'mis_avisos' %}"
           class="inline-flex items-center gap-1 text-sm text-emerald-600 hover:text-emerald-700 font-medium">
            Ver avisos →
        </a>
    </div>

</div>

{% endblock %}
